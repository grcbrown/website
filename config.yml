          title: Grace Brown
          subtitle: |
            <div>I am a 4th year PhD candidate in the Department of Linguistics at Stanford University, advised by Meghan Sumner and Rob Podesva. My research sits at the intersection of speech perception, sociolinguistics, and psycholinguistics. I examine how social meaning is constructed from voices, focusing on how the context in which a talker is encountered shapes both social categorization and memory for what was said.</div> 
            <br>
            <div>My dissertation asks whether the set of talkers a listener hears at encoding shapes recognition memory for spoken words, bringing exemplar accounts of spoken-word recognition together with contextual-binding accounts of episodic memory. At Stanford, I'm affiliated with the Stanford Phonetics Lab and the Interactional Sociophonetics Lab. My research has been supported by the NSF GRFP (DGE-2146755).</div>
          imageUrl: "grace-image.png"
